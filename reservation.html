<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservations - Restaurant Template</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #f5f5f5; }
        h1, h2, h3, h4, h5, .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white font-sans overflow-x-hidden w-full antialiased pt-28 md:pt-24">


    <nav class="fixed w-full z-50 bg-[#0a0a0a]/90 backdrop-blur-md border-b border-neutral-800 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-serif text-[#D4AF37] tracking-widest uppercase" data-config="restaurantName">Logo</a>
            <div class="hidden md:flex space-x-8 text-sm uppercase tracking-wider font-semibold text-neutral-300">
                <a href="index.html" class="hover:text-[#D4AF37] transition-colors">Home</a>
                <a href="menu.html" class="hover:text-[#D4AF37] transition-colors">Menu</a>
                <a href="about.html" class="hover:text-[#D4AF37] transition-colors">About</a>
                <a href="contact.html" class="hover:text-[#D4AF37] transition-colors">Contact</a>
            </div>
            <a href="reservation.html" class="hidden md:block bg-[#D4AF37] text-black px-6 py-2 rounded-sm font-semibold hover:bg-white transition-colors">Book Table</a>
        </div>
    </nav>

    <main class="pt-24 pb-20 min-h-screen flex items-center justify-center">
        <div class="max-w-xl w-full mx-auto px-6">
            <div class="bg-neutral-900 p-10 rounded-2xl shadow-2xl border border-neutral-800">
                <h1 class="text-4xl font-serif text-[#D4AF37] mb-2 text-center">Book a Table</h1>
                <p class="text-neutral-400 text-center mb-8">Reservations will be confirmed via WhatsApp.</p>
                
                <form id="reservation-form" class="space-y-6">
                    <div>
                        <label class="block text-sm text-neutral-400 mb-2">Full Name</label>
                        <input type="text" id="res-name" required class="w-full bg-neutral-950 border border-neutral-800 rounded px-4 py-3 text-white focus:outline-none focus:border-[#D4AF37] transition-colors">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-neutral-400 mb-2">Date</label>
                            <input type="date" id="res-date" required class="w-full bg-neutral-950 border border-neutral-800 rounded px-4 py-3 text-white focus:outline-none focus:border-[#D4AF37] transition-colors cursor-pointer" style="color-scheme: dark;">
                        </div>
                        <div>
                            <label class="block text-sm text-neutral-400 mb-2">Time</label>
                            <input type="time" id="res-time" required class="w-full bg-neutral-950 border border-neutral-800 rounded px-4 py-3 text-white focus:outline-none focus:border-[#D4AF37] transition-colors cursor-pointer" style="color-scheme: dark;">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm text-neutral-400 mb-2">Number of Guests</label>
                        <select id="res-guests" class="w-full bg-neutral-950 border border-neutral-800 rounded px-4 py-3 text-white focus:outline-none focus:border-[#D4AF37] transition-colors cursor-pointer">
                            <option value="1">1 Person</option>
                            <option value="2" selected>2 People</option>
                            <option value="3">3 People</option>
                            <option value="4">4 People</option>
                            <option value="5+">5+ People</option>
                        </select>
                    </div>
                    <button type="submit" class="w-full bg-[#D4AF37] text-black font-bold uppercase tracking-widest py-4 rounded hover:bg-white transition-colors mt-4">Confirm on WhatsApp</button>
                </form>
            </div>
        </div>
    </main>

    <footer class="bg-neutral-950 py-16 border-t border-neutral-900 text-center md:text-left">
        <div class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-12">
            <div>
                <h3 class="text-2xl font-serif text-[#D4AF37] mb-4" data-config="restaurantName">Logo</h3>
                <p class="text-neutral-500 text-sm" data-config="tagline">Tagline</p>
            </div>
            <div>
                <h4 class="text-white uppercase tracking-wider mb-4 font-semibold">Location</h4>
                <p class="text-neutral-500 text-sm mb-2" data-config="address">Address</p>
                <a href="contact.html" class="text-[#D4AF37] text-sm hover:underline">Get Directions</a>
            </div>
            <div>
                <h4 class="text-white uppercase tracking-wider mb-4 font-semibold">Contact</h4>
                <p class="text-neutral-500 text-sm mb-1">Phone: <a href="#" class="phone-link hover:text-white" data-config="phone">Phone</a></p>
                <p class="text-neutral-500 text-sm">Email: <a href="#" class="email-link hover:text-white" data-config="email">Email</a></p>
            </div>
        </div>
    </footer>

    <a href="#" target="_blank" class="wa-link fixed bottom-6 right-6 bg-[#25D366] text-white p-4 rounded-full shadow-lg hover:scale-110 transition-transform z-50 flex items-center justify-center">
        <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51a12.8 12.8 0 0 0-.57-.01c-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413Z"/></svg>
    </a>

    <script src="js/config.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
