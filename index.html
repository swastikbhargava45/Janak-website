<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Janak Cafe</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #f5f5f5; }
        h1, h2, h3, h4, h5, .font-serif { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-[#0a0a0a] text-white font-sans overflow-x-hidden w-full antialiased pt-28 md:pt-24">

    <nav class="fixed top-0 left-0 w-full z-50 bg-[#0a0a0a]/90 backdrop-blur-md border-b border-neutral-800 transition-all duration-300">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <a href="index.html" class="text-2xl font-serif text-[#C69C53] tracking-widest uppercase" data-config="restaurantName">The Janak Cafe</a>
            
            <button onclick="document.getElementById('mobile-menu').classList.toggle('hidden')" class="md:hidden text-[#C69C53] focus:outline-none">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
            </button>

            <div class="hidden md:flex space-x-8 text-sm uppercase tracking-wider font-semibold text-neutral-300 items-center">
                <a href="index.html" class="text-[#C69C53] transition-colors">Home</a>
                <a href="menu.html" class="hover:text-[#C69C53] transition-colors">Menu</a>
                <a href="about.html" class="hover:text-[#C69C53] transition-colors">About</a>
                <a href="contact.html" class="hover:text-[#C69C53] transition-colors">Contact</a>
                <a href="reservation.html" class="bg-[#C69C53] text-black px-6 py-2 rounded-sm font-semibold hover:bg-white transition-colors">Book Table</a>
            </div>
        </div>

        <div id="mobile-menu" class="hidden md:hidden bg-[#0a0a0a] border-b border-neutral-800 pb-4">
            <div class="flex flex-col text-center space-y-4 pt-4 uppercase tracking-wider font-semibold text-neutral-300">
                <a href="index.html" class="text-[#C69C53]">Home</a>
                <a href="menu.html" class="hover:text-[#C69C53]">Menu</a>
                <a href="about.html" class="hover:text-[#C69C53]">About</a>
                <a href="contact.html" class="hover:text-[#C69C53]">Contact</a>
                <a href="reservation.html" class="text-[#C69C53]">Book Table</a>
            </div>
        </div>
    </nav>

    <header class="relative h-[80vh] flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-black/60 z-10"></div>
        <div class="absolute inset-0 bg-cover bg-center" data-img="hero"></div>
        <div class="relative z-20 text-center px-6 max-w-4xl mx-auto">
            <h1 class="text-5xl md:text-7xl font-serif text-white mb-6 tracking-wide" data-config="restaurantName">The Janak Cafe</h1>
            <p class="text-xl md:text-2xl text-neutral-300 mb-10 font-light" data-config="tagline"></p>
            <div class="flex flex-col sm:flex-row justify-center space-y-4 sm:space-y-0 sm:space-x-6">
                <a href="menu.html" class="border border-[#C69C53] text-[#C69C53] px-8 py-3 rounded-sm font-semibold tracking-wider hover:bg-[#C69C53] hover:text-black transition-all duration-300 uppercase">View Menu</a>
            </div>
        </div>
    </header>

    <footer class="bg-neutral-950 py-16 border-t border-neutral-900 text-center md:text-left">
        <div class="max-w-7xl mx-auto px-6 grid grid-cols-1 md:grid-cols-3 gap-12">
            <div><h3 class="text-xl font-serif text-[#C69C53] mb-4" data-config="restaurantName"></h3><p class="text-neutral-500 text-sm" data-config="tagline"></p></div>
            <div><h4 class="text-white uppercase tracking-widest text-sm font-semibold mb-4">Location</h4><p class="text-neutral-400 text-sm leading-relaxed" data-config="address"></p></div>
            <div><h4 class="text-white uppercase tracking-widest text-sm font-semibold mb-4">Contact</h4><p class="text-neutral-400 text-sm mb-2">Phone: <span data-config="phone"></span></p><p class="text-neutral-400 text-sm">Email: <span data-config="email"></span></p></div>
        </div>
    </footer>
    
    <a href="#" class="wa-link fixed bottom-6 right-6 bg-green-500 text-white p-4 rounded-full shadow-2xl z-50 hover:scale-110 transition-transform"><svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.099.824z"/></svg></a>
    <script src="js/config.js"></script><script src="js/main.js"></script>
</body>
</html>
